name: CI (PR)

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: read

jobs:
  # --------------------------------------------------
  # Secret scan — always runs (bảo vệ không lộ secret)
  # --------------------------------------------------
  secret_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source . --no-git --redact

  # --------------------------------------------------
  # Conventions: PR Title (cho trường hợp squash merge)
  # --------------------------------------------------
  pr_title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            build
            perf
            style
            revert

  # --------------------------------------------------
  # Conventions: Branch Naming
  # --------------------------------------------------
  conventions_branch:
    name: Validate branch name
    runs-on: ubuntu-latest
    steps:
      - name: Check branch naming
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Branch: $BRANCH"
          if [[ "$BRANCH" == dependabot/* ]]; then
            echo "✅ Dependabot branch allowed"
          elif [[ ! "$BRANCH" =~ ^(feat|fix|chore|docs|refactor|test|ci|build|perf|style|revert)\/[a-zA-Z0-9_-]+(\/[a-zA-Z0-9_-]+)*$ ]]; then
            echo "❌ Invalid branch name: $BRANCH"
            echo "✅ Expected: <type>/<slug> (e.g., feat/auth-login) or dependabot/*"
            exit 1
          fi
          echo "✅ Branch name OK"

  # --------------------------------------------------
  # Conventions: Commit Messages
  # --------------------------------------------------
  conventions_commits:
    name: Validate commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install commitlint
        run: npm i -D @commitlint/cli @commitlint/config-conventional

      - name: Lint commits in PR range
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          echo "Base: $BASE"
          echo "Head: $HEAD"
          npx commitlint --from "$BASE" --to "$HEAD" --verbose

  # --------------------------------------------------
  # Unit tests — Java services (khi có code)
  # --------------------------------------------------
  test_java:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, auth-service]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - name: Run tests
        run: |
          if [ -f mvnw ]; then
            chmod +x mvnw && ./mvnw -B test --no-transfer-progress
          else
            mvn -B test --no-transfer-progress
          fi

  # --------------------------------------------------
  # Unit tests — Frontend (khi có code)
  # --------------------------------------------------
  test_frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm test -- --run
