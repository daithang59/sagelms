name: CI (PR)

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  # --------------------------------------------------
  # Detect which file types changed (path-filter)
  # --------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      markdown: ${{ steps.filter.outputs.markdown }}
      yaml: ${{ steps.filter.outputs.yaml }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            markdown:
              - '**/*.md'
            yaml:
              - '**/*.yml'
              - '**/*.yaml'

  # --------------------------------------------------
  # Markdown lint (only if .md files changed)
  # --------------------------------------------------
  markdown_lint:
    needs: changes
    if: needs.changes.outputs.markdown == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md

  # --------------------------------------------------
  # YAML lint (only if .yml/.yaml files changed)
  # --------------------------------------------------
  yaml_lint:
    needs: changes
    if: needs.changes.outputs.yaml == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_data: |
            extends: default
            rules:
              line-length: disable

  # --------------------------------------------------
  # Secret scan (always runs)
  # --------------------------------------------------
  secret_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source . --no-git --redact

  # --------------------------------------------------
  # Repo policy (always runs — ensure required files)
  # --------------------------------------------------
  repo_policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure required files exist
        run: |
          test -f README.md
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f .gitignore
          test -f .gitattributes
          test -f .env.example
          test -f .editorconfig
          test -d docs
          test -d infra
          test -d contracts
          test -d .github
