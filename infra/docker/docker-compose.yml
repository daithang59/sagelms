version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sagelms}
      POSTGRES_USER: ${POSTGRES_USER:-sagelms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sagelms}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - sagelms_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sagelms}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - sagelms_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sagelms_pg:
  sagelms_redis:
