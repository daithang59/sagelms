services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sagelms}
      POSTGRES_USER: ${POSTGRES_USER:-sagelms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sagelms}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - sagelms_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sagelms}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - sagelms_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Application Services (optional, build from source) ---

  gateway:
    build:
      context: ../../services/gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_HOST: auth-service
      AUTH_SERVICE_PORT: 8081
    depends_on:
      auth-service:
        condition: service_started
    profiles:
      - app

  auth-service:
    build:
      context: ../../services/auth-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-sagelms}
      DB_USER: ${POSTGRES_USER:-sagelms}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-sagelms}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - app

volumes:
  sagelms_pg:
  sagelms_redis:
