# Manual migration job. Do not add this file to kustomization.
# Run only during a Harbor maintenance window after harbor-registry is scaled to 0.
apiVersion: batch/v1
kind: Job
metadata:
  name: harbor-registry-pvc-to-gcs
  namespace: harbor
  labels:
    app.kubernetes.io/name: harbor-registry-pvc-to-gcs
    app.kubernetes.io/part-of: sagelms
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: harbor-registry-pvc-to-gcs
    spec:
      serviceAccountName: harbor-registry
      restartPolicy: Never
      securityContext:
        fsGroup: 10000
      containers:
        - name: migrate
          image: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 0
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              gcloud storage rsync -r /storage gs://sagelms-devsecops-harbor-registry
              gcloud storage du -s gs://sagelms-devsecops-harbor-registry
          volumeMounts:
            - name: registry-data
              mountPath: /storage
              readOnly: true
      volumes:
        - name: registry-data
          persistentVolumeClaim:
            claimName: harbor-registry
