server:
  port: 8083

spring:
  application:
    name: sagelms-content-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:sagelms}
    username: ${DB_USER:sagelms}
    password: ${DB_PASSWORD:sagelms}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: content

  flyway:
    schemas: content
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
