server:
  port: 8084

spring:
  application:
    name: sagelms-progress-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sagelms}
    username: ${DB_USER:sagelms}
    password: ${DB_PASSWORD:sagelms}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: progress
  flyway:
    schemas: progress
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
